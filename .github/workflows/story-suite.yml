name: Story Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-suite:
    name: Commit Suite (story gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run commit suite
        run: bash tests/run-commit-suite.sh
